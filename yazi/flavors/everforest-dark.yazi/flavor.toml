# flavor.toml
# Everforest Dark Medium - Comprehensive & Exhaustive Edition
# Warm, soft forest theme with high readability and QoL improvements
# Adapted from Gruvbox structure + full Yazi theme coverage

[theme]
name = "everforest-dark"
author = "sainnhe + Grok"
version = "1.4.0"
description = "Everforest Dark Medium - comprehensive, legible, high-contrast status bar, rich filetype support"

# ─────────────────────────────────────────────────────────────────────────────
# Manager (file list, cwd, find, markers, borders)
# ─────────────────────────────────────────────────────────────────────────────
[manager]
cwd = { fg = "#83C092", bold = true }

# Find / search
find_keyword = { fg = "#A7C080", bold = true, italic = true, underline = true }
find_position = { fg = "#E69875", bg = "reset", bold = true, italic = true }

# Symlink
symlink_target = { fg = "#7FBBB3", italic = true }

# Markers & counts
marker_copied = { fg = "#A7C080", bg = "#A7C080" }
marker_cut = { fg = "#E67E80", bg = "#E67E80" }
marker_marked = { fg = "#83C092", bg = "#83C092" }
marker_selected = { fg = "#D3C6AA", bg = "#D3C6AA" }

count_copied = { fg = "#2D353B", bg = "#A7C080", bold = true }
count_cut = { fg = "#2D353B", bg = "#E67E80", bold = true }
count_selected = { fg = "#2D353B", bg = "#D3C6AA", bold = true }

# Border
border_symbol = "│"
border_style = { fg = "#475258" }

# ─────────────────────────────────────────────────────────────────────────────
# Tabs
# ─────────────────────────────────────────────────────────────────────────────
[tabs]
active = { fg = "#2D353B", bg = "#A7C080", bold = true }
inactive = { fg = "#D3C6AA", bg = "#475258" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# ─────────────────────────────────────────────────────────────────────────────
# Mode (NOR / SEL / UNS etc.)
# ─────────────────────────────────────────────────────────────────────────────
[mode]
normal_main = { fg = "#2D353B", bg = "#A7C080", bold = true }
normal_alt = { fg = "#D3C6AA", bg = "#475258" }

select_main = { fg = "#2D353B", bg = "#D699B6", bold = true }
select_alt = { fg = "#D3C6AA", bg = "#475258" }

unset_main = { fg = "#2D353B", bg = "#E67E80", bold = true }
unset_alt = { fg = "#D3C6AA", bg = "#475258" }

# ─────────────────────────────────────────────────────────────────────────────
# Indicator (hovered / parent / preview)
# ─────────────────────────────────────────────────────────────────────────────
[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { underline = true }
padding = { open = "", close = "" }

# ─────────────────────────────────────────────────────────────────────────────
# Status bar - High visibility for NOR, 778B, Top, 1/216, permissions
# ─────────────────────────────────────────────────────────────────────────────
[status]
overall = { fg = "#D3C6AA", bg = "#1F2529" } # Bright fg + dark bg for best readability

sep_left = { open = "\ue0be", close = "\ue0b8" }
sep_right = { open = "\ue0be", close = "\ue0b8" }

# Permissions (right side)
perm_sep = { fg = "#475258" }
perm_type = { fg = "#7FBBB3" }
perm_read = { fg = "#A7C080" }
perm_write = { fg = "#DBBC7F" }
perm_exec = { fg = "#E69875" }

# Progress
progress_label = { fg = "#D3C6AA", bold = true }
progress_normal = { fg = "#83C092", bg = "#1F2529" }
progress_error = { fg = "#E67E80", bg = "#1F2529" }

# ─────────────────────────────────────────────────────────────────────────────
# Which (key hints)
# ─────────────────────────────────────────────────────────────────────────────
[which]
cols = 3
mask = { bg = "#343F44" }
cand = { fg = "#83C092" }
rest = { fg = "#859289" }
desc = { fg = "#E69875" }
separator = "  "
separator_style = { fg = "#475258" }

# ─────────────────────────────────────────────────────────────────────────────
# Confirm dialog
# ─────────────────────────────────────────────────────────────────────────────
[confirm]
border = { fg = "#83C092" }
title = { fg = "#83C092", bold = true }
body = { fg = "#D3C6AA" }
list = { fg = "#D3C6AA" }
btn_yes = { reversed = true, fg = "#A7C080" }
btn_no = { reversed = true, fg = "#E67E80" }
btn_labels = ["  [Y]es  ", "  (N)o  "]

# ─────────────────────────────────────────────────────────────────────────────
# Spot (table view)
# ─────────────────────────────────────────────────────────────────────────────
[spot]
border = { fg = "#83C092" }
title = { fg = "#83C092", bold = true }

tbl_col = { fg = "#83C092" }
tbl_cell = { fg = "#DBBC7F", reversed = true }

# ─────────────────────────────────────────────────────────────────────────────
# Notification
# ─────────────────────────────────────────────────────────────────────────────
[notify]
title_info = { fg = "#A7C080", bold = true }
title_warn = { fg = "#DBBC7F", bold = true }
title_error = { fg = "#E67E80", bold = true }
content_info = { fg = "#D3C6AA" }
content_warn = { fg = "#D3C6AA" }
content_error = { fg = "#D3C6AA" }

# ─────────────────────────────────────────────────────────────────────────────
# Pick (selection menu)
# ─────────────────────────────────────────────────────────────────────────────
[pick]
border = { fg = "#83C092" }
active = { fg = "#2D353B", bg = "#A7C080", bold = true }
inactive = { fg = "#D3C6AA" }

# ─────────────────────────────────────────────────────────────────────────────
# Input (search / rename / etc.)
# ─────────────────────────────────────────────────────────────────────────────
[input]
border = { fg = "#83C092" }
title = { fg = "#D3C6AA", bold = true }
value = { fg = "#D3C6AA" }
selected = { reversed = true, fg = "#2D353B", bg = "#A7C080" }

# ─────────────────────────────────────────────────────────────────────────────
# Completion (cmp)
# ─────────────────────────────────────────────────────────────────────────────
[cmp]
border = { fg = "#83C092" }
active = { reversed = true, fg = "#83C092" }
inactive = { fg = "#D3C6AA" }

# ─────────────────────────────────────────────────────────────────────────────
# Tasks
# ─────────────────────────────────────────────────────────────────────────────
[tasks]
border = { fg = "#475258" }
title = { fg = "#D3C6AA" }
hovered = { underline = true }

# ─────────────────────────────────────────────────────────────────────────────
# Help
# ─────────────────────────────────────────────────────────────────────────────
[help]
on = { fg = "#83C092" }
run = { fg = "#D699B6" }
desc = { fg = "#D3C6AA" }
hovered = { reversed = true, bold = true }
footer = { fg = "#2D353B", bg = "#A7C080", bold = true }

# ─────────────────────────────────────────────────────────────────────────────
# Filetype rules - Exhaustive coverage
# ─────────────────────────────────────────────────────────────────────────────
[filetype]
rules = [
  # Directories
  { url = "*/", fg = "#83C092", bold = true },

  # Text / code
  { mime = "text/*", fg = "#A7C080" },
  { name = "*.toml", fg = "#A7C080" },
  { name = "*.yaml", fg = "#A7C080" },
  { name = "*.yml", fg = "#A7C080" },
  { name = "*.json", fg = "#A7C080" },
  { name = "*.md", fg = "#D699B6" },
  { name = "*.rs", fg = "#7FBBB3" },
  { name = "*.py", fg = "#7FBBB3" },
  { name = "*.lua", fg = "#7FBBB3" },
  { name = "*.js", fg = "#7FBBB3" },
  { name = "*.ts", fg = "#7FBBB3" },
  { name = "*.go", fg = "#7FBBB3" },
  { name = "*.c", fg = "#7FBBB3" },
  { name = "*.cpp", fg = "#7FBBB3" },

  # Images
  { mime = "image/*", fg = "#D699B6" },

  # Audio / Video
  { mime = "{audio,video}/*", fg = "#E69875" },

  # Archives / compressed
  { mime = "application/*zip", fg = "#DBBC7F" },
  { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar,gz}", fg = "#DBBC7F" },

  # Documents
  { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#7FBBB3" },

  # Binaries / executables
  { name = "*.exe", fg = "#E67E80" },
  { name = "*.bin", fg = "#E67E80" },
  { mime = "application/x-executable", fg = "#E67E80" },

  # Hidden / dotfiles (dimmer for less clutter)
  { name = ".*", fg = "#859289" },

  # General fallback
  { url = "*", fg = "#D3C6AA" },
]

# ─────────────────────────────────────────────────────────────────────────────
# Icon fallbacks (pairs well with icon plugins)
# ─────────────────────────────────────────────────────────────────────────────
[icon]
fallback = { fg = "#859289" }
dir = { fg = "#83C092" }
file = { fg = "#D3C6AA" }
