# # Neutralize SDDM's KDE leak
# env = KDE_FULL_SESSION,false
#
# ############# Themes #############
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = XCURSOR_THEME, $cursorTheme
env = XCURSOR_SIZE, $cursorSize

# ######## Toolkit backends ########
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = SDL_VIDEODRIVER, wayland,x11,windows
env = CLUTTER_BACKEND, wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# ####### XDG specifications #######
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# ############# Others #############
env = _JAVA_AWT_WM_NONREPARENTING, 1
env = XDG_MENU_PREFIX,arch-

## hypr-hints ##
env = AT_SPI_BUS_ADDRESS,unix:path=/run/user/1000/at-spi/bus_1
env = ACCESSIBILITY_ENABLED,1
env = QT_ACCESSIBILITY,1
env = QT_LINUX_ACCESSIBILITY_ALWAYS_ON,1
env = NO_AT_BRIDGE,0
